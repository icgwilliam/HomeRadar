name: HomeRadar Daily

on:
  schedule:
    # 14:00 UTC = 09:00 hora Colombia (UTC-5, sin DST)
    - cron: "0 14 * * *"
  workflow_dispatch:  # permite correrlo manualmente desde la UI

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "beautifulsoup4>=4.12" "pandas>=2.0"

      - name: Run HomeRadar scraper
        run: python homeradar.py

      - name: Send results to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
        run: python notify_telegram.py

      - name: Upload CSVs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: propiedades-${{ github.run_id }}
          path: |
            propiedades_raw.csv
            propiedades_limpias.csv
          retention-days: 30
